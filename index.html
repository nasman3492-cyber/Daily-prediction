body {

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;

.telegram {

    color: black;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    text-align: center;
    padding: 90px 20px;
}

.hero h3 {
    color: #94a3b8;

}

    font-size: 52px;
    margin: 10px 0;
}

.hero p {
    color: #cbd5e1;
    max-width: 600px;
    margin: auto;
}

/* BUTTONS */
.buttons {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

.btn, .btn2 {
    padding: 11px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
}

.btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: black;
}

.btn2 {
    border: 1px solid #22c55e;
    color: #e2e8f0;
}

/* CARDS */
.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 40px 20px;
}

.card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
}

.card h2 {
    color: #22c55e;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-top: 1px solid rgba(255,255,255,0.08);
}

/* MOBILE */
@media (max-width: 768px) {

    header {
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }

    nav {
        flex-direction: column;
        align-items: center;
    }

    .hero h1 {
        font-size: 34px;
    }

    .stats {
        grid-template-columns: repeat(2, 1fr);
    }

    .buttons {
        flex-direction: column;
        align-items: center;
    }
}
